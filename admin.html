<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNU Publishers | Admin Executive Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --magenta: #8B008B;
            --dark-magenta: #4B004B;
            --orangered: #FF4500;
            --white: #FFFFFF;
            --bg: #f4f7f6;
            --text: #2d3436;
            --sidebar-width: 280px;
            --border: #e0e0e0;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        .sidebar {
            width: var(--sidebar-width);
            background: #1e1e1e;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            z-index: 1001;
        }

        .sidebar-header {
            padding: 0 20px 30px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .sidebar-logo { height: 45px; filter: brightness(0) invert(1); margin-bottom: 10px; }

        .nav-section {
            padding: 10px 25px 5px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #666;
            font-weight: bold;
        }

        .nav-item {
            padding: 12px 25px;
            display: flex;
            align-items: center; gap: 15px; color: rgba(255,255,255,0.6); text-decoration: none; transition: all 0.2s; cursor: pointer; font-size: 0.9rem; border-left: 4px solid transparent;
        }

        .nav-item:hover, .nav-item.active { background: var(--dark-magenta); color: white; border-left: 4px solid var(--orangered); }

        .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; width: 100%; }

        .top-bar { background: var(--white); height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: var(--shadow); z-index: 100; }

        .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: var(--dark-magenta); }

        .user-profile { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 40px; height: 40px; background: var(--orangered); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

        .dashboard-body { padding: 30px; }
        .page-content { display: none; }
        .page-content.active { display: block; }

        .card { background: white; border-radius: 16px; padding: 25px; box-shadow: var(--shadow); margin-bottom: 25px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-title { font-size: 1.1rem; font-weight: 700; color: var(--dark-magenta); }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 0.75rem; color: #999; text-transform: uppercase; border-bottom: 1px solid #eee; }
        td { padding: 15px 12px; font-size: 0.9rem; border-bottom: 1px solid #f9f9f9; }
        
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .status-success { background: #dcfce7; color: #15803d; }
        
        .btn-primary { background: var(--magenta); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
        .overlay.active { display: block; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1100; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal.active { display: block; }
        .modal-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; }

        .price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* Log specific styling */
        .log-method { font-weight: bold; font-family: monospace; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; }
        .method-get { background: #e0f2fe; color: #0369a1; }
        .method-post { background: #f0fdf4; color: #15803d; }
        .log-endpoint { color: #666; font-family: monospace; font-size: 0.8rem; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .menu-toggle { display: block; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="sidebarOverlay" onclick="closeAll()"></div>

    <div class="modal" id="modalBook">
        <div class="modal-header">
            <h3 class="card-title">Book Details</h3>
            <i class="fas fa-times" style="cursor:pointer" onclick="closeAll()"></i>
        </div>
        <div class="form-group">
            <label>Book Title</label>
            <input type="text" id="bookTitle">
        </div>
        <div class="form-group">
            <label>Image URL</label>
            <input type="text" id="bookImage">
        </div>
        <div class="form-group">
            <label>Author</label>
            <input type="text" id="bookAuthor">
        </div>
        <div class="price-row">
            <div class="form-group">
                <label>Old Price</label>
                <input type="number" id="bookOldPrice">
            </div>
            <div class="form-group">
                <label>New Price</label>
                <input type="number" id="bookNewPrice">
            </div>
        </div>
        <div class="form-group">
            <label>Discount Status</label>
            <select id="bookDiscounted">
                <option value="false">No</option>
                <option value="true">Yes</option>
            </select>
        </div>
        <button class="btn-primary" style="width:100%" onclick="saveBook()">Save</button>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://i.ibb.co/CKRYPD4p/image.png" alt="TUNU" class="sidebar-logo">
            <div style="font-weight: 800; font-size: 0.75rem; letter-spacing: 2px;">ADMIN CONSOLE</div>
        </div>
        <nav>
            <div class="nav-section">Main</div>
            <a onclick="switchPage('insights', this)" class="nav-item active"><i class="fas fa-chart-pie"></i> Insights</a>
            <a onclick="switchPage('inventory', this)" class="nav-item"><i class="fas fa-book"></i> Inventory</a>
            <div class="nav-section">Maintenance</div>
            <a onclick="switchPage('logs', this)" class="nav-item"><i class="fas fa-terminal"></i> System Logs</a>
            <div style="margin-top: auto; padding-top: 30px;">
                <a href="login.html" class="nav-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
                <div id="pageTitle" style="font-weight: 800; font-size: 1.2rem; color: var(--dark-magenta);">Executive Overview</div>
            </div>
        </header>

        <div class="dashboard-body">
            <div id="insights" class="page-content active">
                <p>Overview Content</p>
            </div>

            <div id="inventory" class="page-content">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Book Stock</div>
                        <button class="btn-primary" onclick="openModal('modalBook')">+ Add New</button>
                    </div>
                    <div class="table-wrapper">
                        <table id="inventoryTable">
                            <thead>
                                <tr><th>Image</th><th>Title</th><th>Prices</th><th>Status</th></tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="logs" class="page-content">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Access & Activity Logs</div>
                        <button class="btn-secondary" onclick="fetchLogs()"><i class="fas fa-sync"></i> Refresh</button>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr><th>Timestamp</th><th>Staff</th><th>Action</th><th>Request</th><th>Status</th></tr>
                            </thead>
                            <tbody id="logsTableBody">
                                <!-- Logs will appear here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
            document.getElementById('sidebarOverlay').classList.add('active');
        }

        function closeAll() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('sidebarOverlay').classList.remove('active');
        }

        function fetchLogs() {
            fetch('/admin/logs')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('logsTableBody');
                    tbody.innerHTML = '';
                    data.logs.forEach(log => {
                        const row = tbody.insertRow();
                        const methodClass = log.method === 'GET' ? 'method-get' : 'method-post';
                        row.innerHTML = `
                            <td style="white-space:nowrap; font-size:0.75rem;">${new Date(log.time).toLocaleString()}</td>
                            <td style="font-weight:600;">${log.staff}</td>
                            <td>${log.action}</td>
                            <td>
                                <span class="log-method ${methodClass}">${log.method}</span>
                                <span class="log-endpoint">${log.endpoint}</span>
                            </td>
                            <td><span class="status-pill ${log.status < 400 ? 'status-success' : ''}" style="background:${log.status >= 400 ? '#fee2e2' : ''}; color:${log.status >= 400 ? '#991b1b' : ''}">${log.status}</span></td>
                        `;
                    });
                })
                .catch(err => console.error("Error loading logs:", err));
        }

        function switchPage(pageId, element) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
            
            const titles = { 'insights': 'Executive Overview', 'inventory': 'Book Inventory', 'logs': 'System Activity Logs' };
            document.getElementById('pageTitle').innerText = titles[pageId];

            if(pageId === 'logs') fetchLogs();
            if (window.innerWidth <= 768) closeAll();
        }

        function saveBook() {
            const title = document.getElementById('bookTitle').value;
            const author = document.getElementById('bookAuthor').value;
            const image = document.getElementById('bookImage').value || 'https://i.ibb.co/CKRYPD4p/image.png';
            const oldPrice = document.getElementById('bookOldPrice').value;
            const newPrice = document.getElementById('bookNewPrice').value;
            const discounted = document.getElementById('bookDiscounted').value === 'true';

            const tbody = document.querySelector('#inventoryTable tbody');
            const row = tbody.insertRow(0);
            row.innerHTML = `
                <td><img src="${image}" style="width:40px; height:50px; object-fit:cover; border-radius:4px;"></td>
                <td><div style="font-weight:bold">${title}</div><div style="font-size:0.75rem; color:#777">${author}</div></td>
                <td><div style="font-size:0.8rem; text-decoration:${discounted ? 'line-through' : 'none'}; color:#999">KES ${oldPrice}</div><div style="font-weight:bold; color:var(--magenta)">KES ${newPrice}</div></td>
                <td><span class="status-pill status-success">${discounted ? 'Sale' : 'Normal'}</span></td>
            `;
            closeAll();
        }
    </script>
</body>
</html>
